name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: genaiproject-491818
  REGION: us-central1
  SERVICE_NAME: workorch
  REPOSITORY: workorch

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: 'projects/PROJECT_NUMBER/locations/global/workloadIdentityPools/POOL_ID/providers/PROVIDER_ID'
          service_account: 'deploy-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Docker Auth
        run: |-
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build and Push Container
        run: |-
          docker build -t "${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}" .
          docker push "${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: "${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          flags: |
            --add-cloudsql-instances=${{ env.PROJECT_ID }}:${{ env.REGION }}:workorch-cluster
          env_vars: |
            ALLOYDB_DB_NAME=workorch_db
            ALLOYDB_USER=postgres
            ALLOYDB_HOST=127.0.0.1
            GOOGLE_GENAI_USE_VERTEXAI=0
          secrets: |
            ALLOYDB_PASSWORD=ALLOYDB_PASSWORD:latest
            GOOGLE_API_KEY=GOOGLE_API_KEY:latest
